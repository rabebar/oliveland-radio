<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4A5C28">
<link rel="manifest" href="/manifest.json">
<title>Olive Land Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --cream:#F5F0E6;
  --olive:#4A5C28;
  --olive-dark:#2E3A18;
  --olive-light:#6B7E3A;
  --black:#1C1C1C;
  --red:#C0201A;
  --beige:#E2D9C8;
  --beige2:#C8BCA8;
  --white:#FDFAF4;
}
html,body{
  height:100%;
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  color:var(--black);
  overflow-x:hidden;
}
.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  max-width:480px;
  margin:0 auto;
  position:relative;
}

/* HERO */
.hero{
  position:relative;
  height:260px;
  overflow:hidden;
  flex-shrink:0;
}
.kuf-pal{position:absolute;top:0;left:0;width:50%;height:100%;background:#EEEAE2;}
.kuf-pal::before{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(45deg,#1A1A1A 0,#1A1A1A 2px,transparent 2px,transparent 13px),
    repeating-linear-gradient(-45deg,#1A1A1A 0,#1A1A1A 2px,transparent 2px,transparent 13px);
  opacity:0.75;
}
.kuf-pal::after{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent 0,transparent 11px,rgba(26,26,26,0.45) 11px,rgba(26,26,26,0.45) 13px),
    repeating-linear-gradient(90deg,transparent 0,transparent 11px,rgba(26,26,26,0.45) 11px,rgba(26,26,26,0.45) 13px);
}
.kuf-jor{position:absolute;top:0;right:0;width:50%;height:100%;background:#EEEAE2;}
.kuf-jor::before{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(45deg,#C0201A 0,#C0201A 2px,transparent 2px,transparent 13px),
    repeating-linear-gradient(-45deg,#C0201A 0,#C0201A 2px,transparent 2px,transparent 13px);
  opacity:0.75;
}
.kuf-jor::after{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent 0,transparent 11px,rgba(192,32,26,0.45) 11px,rgba(192,32,26,0.45) 13px),
    repeating-linear-gradient(90deg,transparent 0,transparent 11px,rgba(192,32,26,0.45) 11px,rgba(192,32,26,0.45) 13px);
}
.kuf-hem{position:absolute;bottom:55px;left:0;right:0;z-index:2;}
.kuf-hem div{height:3px;background:rgba(245,240,230,0.7);margin-bottom:4px;}
.kuf-hem .t{height:5px;background:rgba(245,240,230,0.85);}
.kuf-fringe{position:absolute;bottom:0;left:0;right:0;height:52px;z-index:3;}
.kuf-fringe-bar{height:7px;background:rgba(245,240,230,0.95);}
.kuf-fringe-threads{display:flex;align-items:flex-start;height:45px;overflow:hidden;}
.hero-fade{
  position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(to bottom,transparent,var(--cream));z-index:4;
}
.live-badge{
  position:absolute;top:48px;right:16px;z-index:7;
  display:flex;align-items:center;gap:4px;
  background:var(--red);color:white;
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  padding:4px 8px;border-radius:2px;
}
.ldot{width:6px;height:6px;background:white;border-radius:50%;animation:blink 1.1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.lcount{
  position:absolute;top:48px;left:16px;z-index:7;
  font-size:10px;color:rgba(26,26,26,0.6);
  background:rgba(253,250,244,0.85);
  padding:3px 8px;border-radius:2px;
  display:flex;align-items:center;gap:3px;
}
.hero-logo{
  position:absolute;top:56px;left:50%;transform:translateX(-50%);
  z-index:6;text-align:center;
  background:rgba(253,250,244,0.93);
  border-radius:4px;padding:8px 20px 7px;
}
.logo-main{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:900;
  color:var(--black);letter-spacing:2px;
  text-transform:uppercase;line-height:1;
}
.logo-main span{color:var(--red);}
.logo-sub{font-size:0.45rem;letter-spacing:4px;color:var(--black);opacity:0.4;text-transform:uppercase;margin-top:2px;}

/* CONTENT */
.content{
  flex:1;
  padding:12px 16px 90px;
  display:flex;flex-direction:column;gap:12px;
}

/* Now playing */
.np{
  background:var(--white);
  border:1px solid var(--beige);
  border-left:3px solid var(--red);
  border-radius:8px;
  padding:10px 14px;
}
.np-tag{font-size:8px;letter-spacing:2px;color:var(--red);text-transform:uppercase;font-weight:700;margin-bottom:4px;}
.np-title{font-size:0.9rem;font-weight:600;color:var(--black);}
.np-show{font-size:0.72rem;color:var(--beige2);}
.np-prog{width:100%;height:2px;background:var(--beige);border-radius:1px;margin-top:8px;overflow:hidden;}
.np-fill{height:100%;background:linear-gradient(90deg,var(--olive),var(--red));animation:prg 180s linear infinite;}
@keyframes prg{from{width:0%}to{width:100%}}

/* Play section */
.play-section{
  display:flex;flex-direction:column;
  align-items:center;gap:12px;
  padding:8px 0;
}
.big-play{
  width:90px;height:90px;border-radius:50%;
  background:var(--olive);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:white;font-size:32px;
  box-shadow:0 8px 28px rgba(74,92,40,0.35);
  transition:transform 0.15s,background 0.2s;
}
.big-play:active{transform:scale(0.95);}
.big-play.playing{background:var(--red);box-shadow:0 8px 28px rgba(192,32,26,0.35);}
.play-label{font-size:11px;color:var(--beige2);letter-spacing:1px;text-transform:uppercase;}
.wave-row{display:none;align-items:center;gap:3px;height:18px;}
.wave-row.on{display:flex;}
.wb{width:3px;border-radius:2px;background:var(--olive);animation:wv 0.85s ease-in-out infinite;}
.wb:nth-child(1){animation-delay:0s;}.wb:nth-child(2){animation-delay:0.1s;}
.wb:nth-child(3){animation-delay:0.2s;}.wb:nth-child(4){animation-delay:0.3s;}
.wb:nth-child(5){animation-delay:0.4s;}
@keyframes wv{0%,100%{height:3px;}50%{height:16px;}}
.vol-row{display:flex;align-items:center;gap:10px;}
.vic{font-size:14px;color:var(--beige2);}
input[type=range].vsl{
  -webkit-appearance:none;width:140px;height:2px;
  background:var(--beige);border-radius:1px;outline:none;
}
input[type=range].vsl::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--olive);cursor:pointer;
}

/* Stripe */
.kstripe{
  height:4px;
  background:repeating-linear-gradient(
    90deg,
    var(--black) 0,var(--black) 6px,
    var(--cream) 6px,var(--cream) 8px,
    var(--red) 8px,var(--red) 14px,
    var(--cream) 14px,var(--cream) 16px
  );
  border-radius:2px;opacity:0.5;
}

/* Share */
.share-row{display:flex;gap:8px;}
.sbn{
  flex:1;padding:10px 6px;
  border-radius:6px;border:1px solid var(--beige);
  background:var(--white);color:var(--black);
  font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all 0.18s;
}
.sbn:active{transform:scale(0.97);}

/* Call in */
.callin{
  background:var(--beige);
  border:1px solid var(--beige2);
  border-top:3px solid var(--black);
  border-radius:8px;
  padding:14px;text-align:center;
}
.ct{font-size:0.88rem;font-weight:600;color:var(--black);margin-bottom:3px;}
.cd{font-size:0.72rem;color:var(--beige2);margin-bottom:12px;}
.cbtn{
  width:100%;background:var(--black);border:none;border-radius:6px;
  color:white;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;
  padding:12px;cursor:pointer;
  transition:background 0.2s;
}
.cbtn:active{background:var(--red);}

.flags{display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;color:var(--beige2);}
.fmsg{font-size:11px;color:var(--olive);text-align:center;min-height:14px;}

/* Bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:var(--white);
  border-top:1px solid var(--beige);
  display:flex;
  padding:10px 0 env(safe-area-inset-bottom, 16px);
  z-index:100;
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:3px;cursor:pointer;
  padding:4px 0;
}
.bnav-icon{font-size:20px;}
.bnav-label{font-size:9px;color:var(--beige2);letter-spacing:0.5px;text-transform:uppercase;}
.bnav-item.active .bnav-label{color:var(--olive);font-weight:600;}
</style>
</head>
<body>
<div class="page">

  <!-- Hero -->
  <div class="hero">
    <div class="kuf-pal"></div>
    <div class="kuf-jor"></div>
    <div class="kuf-hem">
      <div class="t"></div><div></div><div></div><div class="t"></div>
    </div>
    <div class="kuf-fringe">
      <div class="kuf-fringe-bar"></div>
      <div class="kuf-fringe-threads" id="fringe"></div>
    </div>
    <div class="hero-fade"></div>
    <div class="live-badge"><div class="ldot"></div>LIVE</div>
    <div class="lcount">&#128100; <span id="lc">1,247</span></div>
    <div class="hero-logo">
      <div class="logo-main">OLIVE <span>LAND</span></div>
      <div class="logo-sub">R · A · D · I · O</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <div class="np">
      <div class="np-tag">Now Playing</div>
      <div class="np-title">Olive Land Radio — Live</div>
      <div class="np-show">Live Broadcast</div>
      <div class="np-prog"><div class="np-fill"></div></div>
    </div>

    <div class="play-section">
      <button class="big-play" id="pb" onclick="togglePlay()">▶</button>
      <div class="play-label" id="pl">Tap to Listen Live</div>
      <div class="wave-row" id="wr">
        <div class="wb"></div><div class="wb"></div><div class="wb"></div>
        <div class="wb"></div><div class="wb"></div>
      </div>
      <div class="vol-row">
        <span class="vic">🔈</span>
        <input type="range" class="vsl" id="vol" min="0" max="100" value="80">
        <span class="vic">🔊</span>
      </div>
    </div>

    <div class="kstripe"></div>

    <div class="share-row">
      <button class="sbn" onclick="doShare('tiktok')">▶ TikTok</button>
      <button class="sbn" onclick="doShare('facebook')">📘 Facebook</button>
      <button class="sbn" onclick="doShare('copy')">🔗 Copy</button>
    </div>
    <div class="fmsg" id="fmsg"></div>

    <div class="callin">
      <div class="ct">🎙️ Talk on Air</div>
      <div class="cd">Request to speak live with the host</div>
      <button class="cbtn" onclick="reqSpeak()">📞 Request to Speak</button>
    </div>

    <div class="flags">🇵🇸 Palestine · Jordan · Diaspora 🇯🇴</div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="bnav-item active">
      <div class="bnav-icon">📻</div>
      <div class="bnav-label">Live</div>
    </div>
    <div class="bnav-item">
      <div class="bnav-icon">🎵</div>
      <div class="bnav-label">Shows</div>
    </div>
    <div class="bnav-item">
      <div class="bnav-icon">📅</div>
      <div class="bnav-label">Schedule</div>
    </div>
    <div class="bnav-item">
      <div class="bnav-icon">👤</div>
      <div class="bnav-label">Profile</div>
    </div>
  </div>

</div>

<audio id="player" src="https://stream.zeno.fm/xun1xkhjxmlvv" preload="none"></audio>

<script>
// Fringe
const ft=document.getElementById('fringe');
for(let i=0;i<80;i++){
  const d=document.createElement('div');
  d.style.cssText='width:4px;height:40px;border-radius:0 0 3px 3px;margin:0 1px;flex-shrink:0;';
  if(i%4===0) d.style.background='#F0EBE3';
  else if(i<40) d.style.background='#1A1A1A';
  else d.style.background='#C0201A';
  ft.appendChild(d);
}

// Listeners
setInterval(()=>{
  document.getElementById('lc').textContent=(1247+Math.floor(Math.random()*30)-15).toLocaleString();
},5000);

// Player
const player=document.getElementById('player');
const vol=document.getElementById('vol');
vol.addEventListener('input',()=>player.volume=vol.value/100);

let playing=false;
function togglePlay(){
  if(player.paused){
    player.src='https://stream.zeno.fm/xun1xkhjxmlvv';
    player.play();
  } else {
    player.pause();
    player.src='';
  }
}

player.addEventListener('playing',()=>{
  playing=true;
  document.getElementById('pb').textContent='⏸';
  document.getElementById('pb').classList.add('playing');
  document.getElementById('pl').textContent='On Air — Streaming Live';
  document.getElementById('wr').classList.add('on');
});

player.addEventListener('pause',()=>{
  playing=false;
  document.getElementById('pb').textContent='▶';
  document.getElementById('pb').classList.remove('playing');
  document.getElementById('pl').textContent='Tap to Listen Live';
  document.getElementById('wr').classList.remove('on');
});

function doShare(t){
  if(t==='copy') navigator.clipboard.writeText(window.location.href).catch(()=>{});
  const msgs={tiktok:'Opening TikTok ✓',facebook:'Sharing to Facebook ✓',copy:'Link copied! 🫒'};
  const el=document.getElementById('fmsg');
  el.textContent=msgs[t];
  setTimeout(()=>el.textContent='',3000);
}

function reqSpeak(){
  const el=document.getElementById('fmsg');
  el.textContent='Request sent to host ✓';
  setTimeout(()=>el.textContent='',3000);
}

// PWA
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
