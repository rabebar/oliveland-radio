<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Olive Land Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#F5F0E6;
  --olive:#4A5C28;
  --olive-dark:#2E3A18;
  --olive-light:#6B7E3A;
  --black:#1C1C1C;
  --red:#C0201A;
  --beige:#E2D9C8;
  --beige2:#C8BCA8;
  --white:#FDFAF4;
  --green:#2E8B3D;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);color:var(--black);
  min-height:100vh;
}
.topbar{
  background:var(--olive-dark);color:white;
  padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-name{
  font-family:'Playfair Display',serif;
  font-size:1.1rem;font-weight:900;letter-spacing:1px;
}
.topbar-tag{
  font-size:0.6rem;letter-spacing:3px;color:rgba(255,255,255,0.55);
  text-transform:uppercase;
}
.topbar-right{font-size:0.8rem;color:rgba(255,255,255,0.7);}
.kstripe{
  height:4px;
  background:repeating-linear-gradient(
    90deg,
    var(--black) 0,var(--black) 6px,
    var(--cream) 6px,var(--cream) 8px,
    var(--red) 8px,var(--red) 14px,
    var(--cream) 14px,var(--cream) 16px
  );
}
.container{max-width:900px;margin:0 auto;padding:24px;}
.section{
  background:white;border:1px solid var(--beige);border-radius:10px;
  padding:20px;margin-bottom:20px;
}
.section-title{
  font-family:'Playfair Display',serif;
  font-size:1.2rem;font-weight:700;color:var(--black);
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.section-title .badge{
  background:var(--red);color:white;
  font-size:0.7rem;font-family:'DM Sans',sans-serif;
  padding:2px 8px;border-radius:10px;font-weight:600;
}

.req-card{
  background:var(--cream);border:1px solid var(--beige);
  border-left:4px solid var(--olive);
  border-radius:8px;padding:14px;
  margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;flex-wrap:wrap;
}
.req-info{flex:1;min-width:180px;}
.req-name{font-size:0.95rem;font-weight:600;color:var(--black);}
.req-email{font-size:0.75rem;color:var(--olive);}
.req-time{font-size:0.7rem;color:var(--beige2);margin-top:2px;}
.req-actions{display:flex;gap:8px;}
.btn{
  border:none;border-radius:6px;
  padding:8px 16px;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;
  transition:transform 0.15s,opacity 0.2s;
}
.btn:active{transform:scale(0.96);}
.btn-accept{background:var(--green);color:white;}
.btn-reject{background:var(--red);color:white;}
.btn-end{background:var(--black);color:white;}

.empty-state{
  text-align:center;padding:30px 20px;
  color:var(--beige2);font-size:0.85rem;
}
.empty-state .em{font-size:32px;display:block;margin-bottom:10px;opacity:0.5;}

.active-call{
  background:linear-gradient(135deg,var(--green),var(--olive));
  color:white;border-radius:8px;padding:14px;margin-bottom:10px;
}
.call-title{font-size:0.85rem;font-weight:600;margin-bottom:4px;}
.call-name{font-size:1.05rem;font-weight:700;margin-bottom:8px;}
.call-actions{display:flex;gap:8px;}
.btn-join{background:white;color:var(--olive-dark);}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
  background:var(--olive);color:white;
  padding:12px 22px;border-radius:30px;
  font-size:13px;font-weight:600;z-index:300;
  box-shadow:0 6px 20px rgba(74,92,40,0.4);
  transition:transform 0.4s ease-out;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);}

iframe.daily-frame{
  width:100%;height:480px;border:none;
  border-radius:10px;margin-top:14px;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span style="font-size:22px;">🫒</span>
    <div>
      <div class="topbar-name">Olive Land</div>
      <div class="topbar-tag">Admin Panel</div>
    </div>
  </div>
  <div class="topbar-right">{{ user.name }}</div>
</div>
<div class="kstripe"></div>

<div class="container">

  <!-- Active Call -->
  <div class="section" id="active-call-section" style="display:none;">
    <div class="section-title">🎙️ Active Call</div>
    <div id="active-call-content"></div>
  </div>

  <!-- Pending Requests -->
  <div class="section">
    <div class="section-title">
      📞 Speak Requests
      <span class="badge" id="req-count">0</span>
    </div>
    <div id="requests-list">
      <div class="empty-state" id="empty-requests">
        <span class="em">📭</span>
        No pending requests
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const socket = io();
const requestsList = document.getElementById('requests-list');
const emptyState = document.getElementById('empty-requests');
const reqCount = document.getElementById('req-count');
const activeCallSection = document.getElementById('active-call-section');
const activeCallContent = document.getElementById('active-call-content');

let pending = {};
let activeCallId = null;

function updateCount(){
  const n = Object.keys(pending).length;
  reqCount.textContent = n;
  emptyState.style.display = n === 0 ? 'block' : 'none';
}

function renderRequest(r){
  const div = document.createElement('div');
  div.className = 'req-card';
  div.id = 'req-'+r.id;
  div.innerHTML = `
    <div class="req-info">
      <div class="req-name">${escapeHtml(r.name)}</div>
      <div class="req-email">${escapeHtml(r.email)}</div>
      <div class="req-time">Requested at ${r.created_at}</div>
    </div>
    <div class="req-actions">
      <button class="btn btn-accept" onclick="acceptReq(${r.id})">✓ Accept</button>
      <button class="btn btn-reject" onclick="rejectReq(${r.id})">✗ Reject</button>
    </div>
  `;
  requestsList.insertBefore(div, emptyState);
  pending[r.id] = r;
  updateCount();
}

function removeRequest(id){
  const el = document.getElementById('req-'+id);
  if(el) el.remove();
  delete pending[id];
  updateCount();
}

function acceptReq(id){
  socket.emit('accept_speak', {id});
}

function rejectReq(id){
  if(confirm('Reject this request?')){
    socket.emit('reject_speak', {id});
  }
}

function endCall(){
  if(activeCallId !== null){
    socket.emit('end_speak', {id: activeCallId});
    activeCallId = null;
    activeCallSection.style.display = 'none';
    activeCallContent.innerHTML = '';
  }
}

function showActiveCall(req){
  activeCallId = req.id;
  activeCallSection.style.display = 'block';
  activeCallContent.innerHTML = `
    <div class="active-call">
      <div class="call-title">In conversation with</div>
      <div class="call-name">${escapeHtml(req.name)}</div>
      <div class="call-actions">
        <button class="btn btn-join" onclick="window.open('${req.room_url}','_blank')">🎙️ Join Room</button>
        <button class="btn btn-end" onclick="endCall()">End Call</button>
      </div>
    </div>
    <iframe class="daily-frame" src="${req.room_url}" allow="microphone;camera;autoplay"></iframe>
  `;
}

function escapeHtml(t){
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

// Socket events
socket.on('connect', ()=>{
  socket.emit('admin_join');
  socket.emit('get_speak_requests');
});

socket.on('speak_requests_list', list=>{
  list.forEach(renderRequest);
});

socket.on('new_speak_request', r=>{
  renderRequest(r);
  showToast('New speak request from '+r.name);
  // Play notification sound
  try{ new Audio('data:audio/wav;base64,UklGRiQEAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAEAAAA').play(); }catch(e){}
});

socket.on('speak_request_updated', r=>{
  if(r.status === 'accepted'){
    removeRequest(r.id);
    showActiveCall(r);
  } else if(r.status === 'rejected'){
    removeRequest(r.id);
    showToast('Request rejected');
  }
});

socket.on('speak_error', e=>{
  showToast(e.msg, true);
});
</script>

</body>
</html>
